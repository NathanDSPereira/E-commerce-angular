<div class="rounded-2xl p-1  bg-white relative flex-col h-96 max-h-96 w-60 flex items-center justify-between" (click)="navegarParaProdutoDetalhado()">
    <div class="h-2/5 object-contain">
        <img class="h-full w-fit object-contain" [src]="favoritosItem.imagemUrl"  [alt]="favoritosItem.titulo">
    </div>
    
    <div class="flex flex-col gap-3 pb-10">
        <h4 class="text-lg text-slate-800">{{ favoritosItem.titulo }}</h4>
        
        <p class="text-slate-700">em até 10x <strong><i>sem juros</i></strong> de {{favoritosItem.preco/10 | currency:'BRL':'symbol':'1.2-2'}}</p>

        <p class="text-lg text-slate-900 font-bold">{{favoritosItem.preco | currency:'BRL':'symbol':'1.2-2'}}</p>
    </div>
